name: Backend CI

on:
  push:
    branches:
      - main
      - backend

  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run automated tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_db_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d finance_db_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_db_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up npm
        run: npm install --global npm@11.6.1

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Create database tables
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d finance_db_test \
            -f database/schema.sql

      - name: Run automated tests
        run: npm test
